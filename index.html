<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <!-- Elegant fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="fade-in">HEY! I'm Nived Rajan 👋</h1>
    <p class="subtitle fade-in-delay">Aspiring Tech & Business Enthusiast</p>
    <p class="subtitle2 fade-in-delay2">Welcome To My Portfolio</p>

    <div class="card fade-up">
        <h2>Contact Me</h2>

        <form id="contactForm">
            <input type="text" id="name" name="name" placeholder="Your Name" required>
            <input type="email" id="email" name="email" placeholder="Your Email" required>
            <textarea id="message" name="message" placeholder="Your Message"></textarea>
            <button type="submit">Send</button>
        </form>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
